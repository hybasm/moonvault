<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wozmen — Élégance mystérieuse</title>
  <link rel="stylesheet" href="wozmen.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">Wozmen</div>
    <nav class="nav">
      <a href="#">Accueil</a>
      <a href="#collections">Collections</a>
      <a href="#about">À propos</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Élégance mystérieuse</h1>
    <p>Collections nuit — lignes pures, accents dorés. Pièces durables et silhouettes contemporaines.</p>
    <a class="btn primary" href="#collections">Voir la collection</a>
  </section>

  <main id="collections" class="products">
    <article class="card">
      <img src="https://via.placeholder.com/900x700?text=Robe+Nuit" alt="Robe nuit">
      <div class="card-content">
        <h3>Robe Nuit</h3>
        <p class="price">129€</p>
      </div>
    </article>
    <article class="card">
      <img src="https://via.placeholder.com/900x700?text=Veste+Or" alt="Veste or">
      <div class="card-content">
        <h3>Veste Or</h3>
        <p class="price">199€</p>
      </div>
    </article>
  </main>

  <footer id="contact" class="site-footer">
    <p>&copy; 2026 Wozmen — Tous droits réservés</p>
  </footer>
</body>
</html>
